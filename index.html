<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem('theme-preference');
        const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = savedTheme || preferredTheme;
      })();
    </script>
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <main>
      <header class="app-header">
        <div class="header-top-row">
          <div>
            <h1>My <span>Tasks</span></h1>
            <p class="app-subtitle">Stay organised. Click a task to add details.</p>
          </div>
          <label class="theme-toggle" for="theme-toggle" aria-label="Toggle dark mode">
            <input type="checkbox" id="theme-toggle" aria-label="Toggle between light mode and dark mode" />
            <span class="theme-toggle-track">
              <span class="theme-icon theme-icon-light" aria-hidden="true">☀️</span>
              <span class="theme-toggle-thumb"></span>
              <span class="theme-icon theme-icon-dark" aria-hidden="true">🌙</span>
            </span>
          </label>
        </div>
      </header>

      <!-- Add task -->
      <div class="section">
        <form id="add-form" aria-label="Add a new task">
          <input
            type="text"
            id="task-input"
            placeholder="What needs to be done?"
            maxlength="200"
            autocomplete="off"
            aria-label="Task description"
          />
          <select id="priority-select" aria-label="Priority">
            <option value="medium">⚡ Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🟢 Low</option>
          </select>
          <button type="submit" id="add-btn">Add</button>
        </form>
      </div>

      <!-- Filter + reset bar -->
      <div class="section">
        <div class="filter-bar" role="group" aria-label="Filter tasks">
          <label>Show:</label>
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button id="reset-btn" aria-label="Clear all tasks">🗑 Reset</button>
        </div>

        <!-- Stats -->
        <p class="stats" aria-live="polite" id="stats"></p>
      </div>

      <!-- Task list -->
      <ul id="task-list" aria-label="Task list"></ul>

      <!-- Empty state -->
      <div id="empty-state" hidden>
        <span class="icon">✅</span>
        Nothing here yet — add your first task above!
      </div>
    </main>

    <!-- Task detail modal -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-task-title">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">
            <span>Task Details</span>
            <span id="modal-task-title"></span>
          </div>
          <button class="modal-close" id="modal-close-btn" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-row">
            <div class="modal-field">
              <label for="detail-date">📅 Date</label>
              <input type="date" id="detail-date" />
            </div>
            <div class="modal-field">
              <label for="detail-time">🕐 Time</label>
              <input type="time" id="detail-time" />
            </div>
          </div>
          <div class="modal-field">
            <label for="detail-location">📍 Location</label>
            <input type="text" id="detail-location" placeholder="e.g. 123 Main St" maxlength="200" />
          </div>
          <div class="modal-field">
            <label for="detail-notes">📝 Notes</label>
            <textarea id="detail-notes" rows="3" placeholder="Any extra info…" maxlength="1000"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="modal-cancel-btn" id="modal-cancel-btn">Cancel</button>
          <button class="modal-save-btn" id="modal-save-btn">Save Details</button>
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────
      let tasks = [];
      let currentFilter = 'all';
      let nextId = 1;

      // ── DOM refs ───────────────────────────────────────────────────────────
      const form        = document.getElementById('add-form');
      const input       = document.getElementById('task-input');
      const prioritySel = document.getElementById('priority-select');
      const taskList    = document.getElementById('task-list');
      const emptyState  = document.getElementById('empty-state');
      const statsEl     = document.getElementById('stats');
      const filterBtns  = document.querySelectorAll('.filter-btn');
      const resetBtn    = document.getElementById('reset-btn');
      const themeToggle = document.getElementById('theme-toggle');

      // ── Modal refs ─────────────────────────────────────────────────────────
      const modalOverlay   = document.getElementById('modal-overlay');
      const modalTaskTitle = document.getElementById('modal-task-title');
      const detailDate     = document.getElementById('detail-date');
      const detailTime     = document.getElementById('detail-time');
      const detailLocation = document.getElementById('detail-location');
      const detailNotes    = document.getElementById('detail-notes');
      const modalSaveBtn   = document.getElementById('modal-save-btn');
      const modalCancelBtn = document.getElementById('modal-cancel-btn');
      const modalCloseBtn  = document.getElementById('modal-close-btn');
      let   activeModalId  = null;

      // ── Theme ──────────────────────────────────────────────────────────────
      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        if (themeToggle) {
          themeToggle.checked = theme === 'dark';
        }
      }

      const initialTheme = document.documentElement.dataset.theme || 'light';
      applyTheme(initialTheme);

      themeToggle?.addEventListener('change', () => {
        const nextTheme = themeToggle.checked ? 'dark' : 'light';
        applyTheme(nextTheme);
        localStorage.setItem('theme-preference', nextTheme);
      });

      // ── Helpers ────────────────────────────────────────────────────────────
      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function priorityLabel(p) {
        return { high: '🔴 High', medium: '⚡ Medium', low: '🟢 Low' }[p] ?? p;
      }

      function hasDetails(task) {
        const d = task.details;
        return d && (d.date || d.time || d.location || d.notes);
      }

      function celebrateCompletion(originElement) {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        const rect = originElement.getBoundingClientRect();
        const burst = document.createElement('div');
        const colors = ['#818cf8', '#f472b6', '#f59e0b', '#34d399', '#60a5fa'];
        const pieceCount = 18;
        const centerX = rect.left + (rect.width / 2);
        const centerY = rect.top + (rect.height / 2);

        burst.className = 'celebration-burst';

        for (let index = 0; index < pieceCount; index++) {
          const piece = document.createElement('span');
          const angle = (Math.PI * 2 * index) / pieceCount;
          const distance = 45 + Math.random() * 35;
          const size = 7 + Math.random() * 6;

          piece.className = 'celebration-piece';
          piece.style.left = `${centerX}px`;
          piece.style.top = `${centerY}px`;
          piece.style.width = `${size}px`;
          piece.style.height = `${size}px`;
          piece.style.background = colors[index % colors.length];
          piece.style.setProperty('--x', `${Math.cos(angle) * distance}px`);
          piece.style.setProperty('--y', `${Math.sin(angle) * distance}px`);
          piece.style.setProperty('--rotate', `${(Math.random() * 360) - 180}deg`);

          burst.appendChild(piece);
        }

        document.body.appendChild(burst);
        window.setTimeout(() => burst.remove(), 900);
      }

      function openModal(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        activeModalId        = id;
        modalTaskTitle.textContent = task.text;
        detailDate.value     = task.details.date     || '';
        detailTime.value     = task.details.time     || '';
        detailLocation.value = task.details.location || '';
        detailNotes.value    = task.details.notes    || '';
        modalOverlay.classList.add('open');
        detailDate.focus();
      }

      function closeModal() {
        modalOverlay.classList.remove('open');
        activeModalId = null;
      }

      function saveModal() {
        const task = tasks.find(t => t.id === activeModalId);
        if (task) {
          task.details.date     = detailDate.value;
          task.details.time     = detailTime.value;
          task.details.location = detailLocation.value.trim();
          task.details.notes    = detailNotes.value.trim();
        }
        closeModal();
        render();
      }

      // Modal controls
      modalSaveBtn.addEventListener('click', saveModal);
      modalCancelBtn.addEventListener('click', closeModal);
      modalCloseBtn.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
      });

      // ── Render ─────────────────────────────────────────────────────────────
      function render() {
        const priorityOrder = { high: 0, medium: 1, low: 2 };
        const visible = tasks
          .filter(t => {
            if (currentFilter === 'active')    return !t.completed;
            if (currentFilter === 'completed') return  t.completed;
            return true;
          })
          .sort((a, b) => (priorityOrder[a.priority] ?? 1) - (priorityOrder[b.priority] ?? 1));

        taskList.innerHTML = '';

        visible.forEach(task => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.completed ? ' completed' : '');
          li.dataset.id = task.id;
          li.innerHTML = `
            <input
              type="checkbox"
              class="task-checkbox"
              ${task.completed ? 'checked' : ''}
              aria-label="Mark '${escapeHtml(task.text)}' as ${task.completed ? 'active' : 'completed'}"
            />
            <span class="task-text" role="button" tabindex="0" title="Click to view / add details" aria-label="Open details for '${escapeHtml(task.text)}'"><span class="task-title-text">${escapeHtml(task.text)}</span>${hasDetails(task) ? '<span class="detail-dot" title="Has details"></span>' : ''}</span>
            <span class="priority-badge priority-${task.priority}">${priorityLabel(task.priority)}</span>
            <button class="edit-btn" aria-label="Edit task '${escapeHtml(task.text)}'" ${task.completed ? 'disabled style="opacity:0.35;cursor:not-allowed"' : ''}>✏</button>
            <button class="delete-btn" aria-label="Delete task '${escapeHtml(task.text)}'">✕</button>
          `;
          taskList.appendChild(li);
        });

        // Empty state
        emptyState.hidden = visible.length > 0;

        // Stats
        const total     = tasks.length;
        const done      = tasks.filter(t => t.completed).length;
        const remaining = total - done;
        statsEl.innerHTML =
          `<span class="stat-chip"><strong>${remaining}</strong> remaining</span>
           <span class="stat-chip"><strong>${done}</strong> completed</span>
           <span class="stat-chip"><strong>${total}</strong> total</span>`;
      }

      // ── Add task (form submit + Enter key handled by submit event) ─────────
      form.addEventListener('submit', e => {
        e.preventDefault();
        const text = input.value.trim();

        if (!text) {
          input.classList.add('error');
          input.addEventListener('animationend', () => input.classList.remove('error'), { once: true });
          input.focus();
          return;
        }

        tasks.push({
          id: nextId++,
          text,
          completed: false,
          priority: prioritySel.value,
          details: { date: '', time: '', location: '', notes: '' },
        });

        input.value = '';
        input.focus();
        render();
      });

      // ── Toggle complete & delete (event delegation) ────────────────────────
      taskList.addEventListener('click', e => {
        const li = e.target.closest('.task-item');
        if (!li) return;
        const id = Number(li.dataset.id);

        if (e.target.classList.contains('task-checkbox')) {
          const task = tasks.find(t => t.id === id);
          if (task) {
            const wasCompleted = task.completed;
            task.completed = e.target.checked;

            if (!wasCompleted && task.completed) celebrateCompletion(e.target);

            render();
          }
        }

        if (e.target.classList.contains('delete-btn')) {
          tasks = tasks.filter(t => t.id !== id);
          render();
        }

        // Open detail modal when clicking the task text
        if (e.target.classList.contains('task-text') || e.target.classList.contains('task-title-text') || e.target.classList.contains('detail-dot')) {
          openModal(id);
          return;
        }

        if (e.target.classList.contains('edit-btn')) {
          const task = tasks.find(t => t.id === id);
          if (!task) return;
          // Replace row content with inline edit UI
          li.innerHTML = `
            <input class="edit-input" type="text" value="${escapeHtml(task.text)}" maxlength="200" aria-label="Edit task text" />
            <button class="save-btn">Save</button>
            <button class="cancel-btn">Cancel</button>
          `;
          const editInput = li.querySelector('.edit-input');
          editInput.focus();
          editInput.select();

          const commitEdit = () => {
            const newText = editInput.value.trim();
            if (newText) task.text = newText;
            render();
          };

          li.querySelector('.save-btn').addEventListener('click', commitEdit);
          li.querySelector('.cancel-btn').addEventListener('click', () => render());
          editInput.addEventListener('keydown', e => {
            if (e.key === 'Enter')  { e.preventDefault(); commitEdit(); }
            if (e.key === 'Escape') { render(); }
          });
        }
      });

      // ── Keyboard: Enter on task-text opens modal; Escape clears add-input ──
      taskList.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.classList.contains('task-text')) {
          const li = e.target.closest('.task-item');
          if (li) openModal(Number(li.dataset.id));
        }
      });

      input.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          input.value = '';
        }
      });

      // ── Filter buttons ─────────────────────────────────────────────────────
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          filterBtns.forEach(b => b.classList.toggle('active', b === btn));
          render();
        });
      });

      // ── Reset ──────────────────────────────────────────────────────────────
      resetBtn.addEventListener('click', () => {
        if (tasks.length === 0) return;
        if (confirm('Clear all tasks and start over?')) {
          tasks         = [];
          nextId        = 1;
          currentFilter = 'all';
          filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
          input.value   = '';
          render();
        }
      });

      // ── Initial render ─────────────────────────────────────────────────────
      render();
    </script>
  </body>
</html>
